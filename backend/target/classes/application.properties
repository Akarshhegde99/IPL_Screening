spring.application.name=backend
server.port=8080

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:harveyscafe_ipl;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Let Spring Boot auto-detect the dialect (H2)
# JWT Configuration
app.jwt.secret=harveysCafeSuperSecretKeyForJwtAuthenticationWhichShouldBeLongEnoughToSurpass256Bits
app.jwt.expiration-ms=86400000

# Stripe Configuration (Optional)
stripe.api.key=sk_test_replace_with_real_key_or_leave_mocked

# Load Initial Data Loader Flag
app.data-loader.enabled=true
